<!-- QR Library -->
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  if (typeof QRCode === "undefined") {
    console.error("QR library failed to load");
    document.getElementById('status').textContent = "✗ QR library failed to load";
    return;
  }

  let currentType = 'url';

  const typeConfigs = {
    url: {
      fields: [{ id: 'main-input', label: 'URL', placeholder: 'https://example.com', type: 'text' }],
      build: () => document.getElementById('main-input')?.value.trim()
    },
    text: {
      fields: [{ id: 'main-input', label: 'Text', placeholder: 'Enter your text here...', type: 'textarea' }],
      build: () => document.getElementById('main-input')?.value.trim()
    },
    email: {
      fields: [{ id: 'main-input', label: 'Email Address', placeholder: 'hello@example.com', type: 'text' }],
      build: () => {
        const v = document.getElementById('main-input')?.value.trim();
        return v ? `mailto:${v}` : '';
      }
    },
    phone: {
      fields: [{ id: 'main-input', label: 'Phone Number', placeholder: '+44...', type: 'text' }],
      build: () => {
        const v = document.getElementById('main-input')?.value.trim();
        return v ? `tel:${v}` : '';
      }
    },
    sms: {
      fields: [{ id: 'main-input', label: 'Phone Number', placeholder: '+44...', type: 'text' }],
      build: () => {
        const v = document.getElementById('main-input')?.value.trim();
        return v ? `sms:${v}` : '';
      }
    },
    wifi: {
      fields: [
        { id: 'wifi-ssid', label: 'SSID', placeholder: 'MyWiFi', type: 'text' },
        { id: 'wifi-pass', label: 'Password', placeholder: 'password', type: 'text' },
        { id: 'wifi-type', label: 'Security', type: 'select', options: ['WPA', 'WEP', 'nopass'] }
      ],
      build: () => {
        const ssid = document.getElementById('wifi-ssid')?.value.trim();
        const pass = document.getElementById('wifi-pass')?.value.trim();
        const type = document.getElementById('wifi-type')?.value || 'WPA';
        return ssid ? `WIFI:T:${type};S:${ssid};P:${pass};;` : '';
      }
    }
  };

  window.setType = function(type, btn) {
    currentType = type;

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    const config = typeConfigs[type];
    const container = document.getElementById('input-fields');

    container.innerHTML = config.fields.map(f => {
      if (f.type === 'textarea') {
        return `<div class="field-row"><label>${f.label}</label><textarea id="${f.id}" placeholder="${f.placeholder}" oninput="generate()"></textarea></div>`;
      } else if (f.type === 'select') {
        return `<div class="field-row"><label>${f.label}</label><select id="${f.id}" onchange="generate()">${f.options.map(o => `<option>${o}</option>`).join('')}</select></div>`;
      } else {
        return `<div class="field-row"><label>${f.label}</label><input id="${f.id}" placeholder="${f.placeholder}" oninput="generate()" /></div>`;
      }
    }).join('');

    clearQR();
  };

  function getSize() {
    return parseInt(document.getElementById('size').value);
  }

  window.updateSize = function() {
    document.getElementById('size-val').textContent = getSize() + 'px';
    generate();
  };

  function clearQR() {
    const canvas = document.getElementById('qr-canvas');
    canvas.style.display = 'none';
    document.getElementById('placeholder').style.display = 'flex';
    document.getElementById('status').textContent = '';
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  }

  window.generate = function() {
    const content = typeConfigs[currentType].build();
    const status = document.getElementById('status');

    if (!content) {
      clearQR();
      return;
    }

    const canvas = document.getElementById('qr-canvas');
    const size = getSize();

    canvas.width = size;
    canvas.height = size;

    QRCode.toCanvas(canvas, content, {
      width: size,
      margin: 2,
      errorCorrectionLevel: 'H',
      color: {
        dark: document.getElementById('dark-color').value,
        light: document.getElementById('light-color').value
      }
    }, function (error) {
      if (error) {
        status.textContent = '✗ Failed to generate QR';
        status.className = 'status err';
        return;
      }

      canvas.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      status.textContent = '✓ QR code generated';
      status.className = 'status ok';
    });
  };

  window.downloadQR = function() {
    const canvas = document.getElementById('qr-canvas');
    if (canvas.style.display === 'none') return;

    const a = document.createElement('a');
    a.download = 'qrcode.png';
    a.href = canvas.toDataURL();
    a.click();
  };

  window.clearAll = function() {
    document.querySelectorAll('#input-fields input, #input-fields textarea').forEach(el => el.value = '');
    clearQR();
  };

});
</script>
